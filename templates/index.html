<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline RAG - PDF Q&A</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            max-width: 700px;
            margin: 0 auto;
            padding: 2rem;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
        }
        .subtitle { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
        .card {
            background: #16213e;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .upload-zone {
            border: 2px dashed #444;
            border-radius: 8px;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
        }
        .upload-zone:hover, .upload-zone.dragover { border-color: #4a9eff; background: #1f3460; }
        .upload-zone input { display: none; }
        .btn {
            background: #4a9eff;
            color: white;
            border: none;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
        }
        .btn:hover { background: #3a8eef; }
        .btn:disabled { background: #555; cursor: not-allowed; }
        .status { margin-top: 0.75rem; font-size: 0.9rem; }
        .status.success { color: #5cb85c; }
        .status.error { color: #d9534f; }
        .qa-section { display: none; }
        .qa-section.ready { display: block; }
        .ask-form { display: flex; gap: 0.5rem; margin-bottom: 1rem; }
        .ask-form input {
            flex: 1;
            padding: 0.6rem 1rem;
            border-radius: 6px;
            border: 1px solid #444;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
        }
        .ask-form input:focus { outline: none; border-color: #4a9eff; }
        .answer-box {
            background: #0f3460;
            border-radius: 8px;
            padding: 1rem;
            white-space: pre-wrap;
            line-height: 1.5;
        }
        .answer-box.empty { color: #888; }
    </style>
</head>
<body>
    <h1>Offline RAG - PDF Q&A</h1>
    <p class="subtitle">Upload a PDF (30–50 pages recommended) and ask questions. Runs fully offline.</p>

    <div class="card">
        <label class="upload-zone" id="uploadZone">
            <input type="file" id="pdfInput" accept=".pdf">
            <p><strong>Click or drop your PDF here</strong></p>
            <p style="color:#888;font-size:0.9rem">Max 50 MB</p>
        </label>
        <button class="btn" id="uploadBtn" disabled>Index PDF</button>
        <p class="status" id="uploadStatus"></p>
    </div>

    <div class="card qa-section" id="qaSection">
        <h2 style="font-size:1.1rem;margin-top:0">Ask a question</h2>
        <form class="ask-form" id="askForm">
            <input type="text" id="questionInput" placeholder="Ask something about your document..." autocomplete="off">
            <button type="submit" class="btn" id="askBtn">Ask</button>
        </form>
        <div class="answer-box empty" id="answerBox">Your answer will appear here.</div>
    </div>

    <script>
        const uploadZone = document.getElementById('uploadZone');
        const pdfInput = document.getElementById('pdfInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const uploadStatus = document.getElementById('uploadStatus');
        const qaSection = document.getElementById('qaSection');
        const askForm = document.getElementById('askForm');
        const questionInput = document.getElementById('questionInput');
        const askBtn = document.getElementById('askBtn');
        const answerBox = document.getElementById('answerBox');

        let selectedFile = null;

        uploadZone.addEventListener('click', () => pdfInput.click());
        uploadZone.addEventListener('dragover', (e) => { e.preventDefault(); uploadZone.classList.add('dragover'); });
        uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('dragover'));
        uploadZone.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadZone.classList.remove('dragover');
            const f = e.dataTransfer.files[0];
            if (f && f.name.toLowerCase().endsWith('.pdf')) { selectFile(f); }
        });
        pdfInput.addEventListener('change', () => { if (pdfInput.files[0]) selectFile(pdfInput.files[0]); });

        function selectFile(file) {
            selectedFile = file;
            uploadBtn.disabled = false;
            uploadStatus.textContent = `Selected: ${file.name}`;
            uploadStatus.className = 'status';
        }

        uploadBtn.addEventListener('click', async () => {
            if (!selectedFile) return;
            uploadBtn.disabled = true;
            uploadStatus.textContent = 'Indexing PDF... (this may take a minute for large files)';
            uploadStatus.className = 'status';

            const formData = new FormData();
            formData.append('pdf', selectedFile);

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                const data = await res.json();
                if (data.success) {
                    uploadStatus.textContent = data.message;
                    uploadStatus.className = 'status success';
                    qaSection.classList.add('ready');
                    selectedFile = null;
                    pdfInput.value = '';
                } else {
                    uploadStatus.textContent = 'Error: ' + (data.error || 'Unknown error');
                    uploadStatus.className = 'status error';
                    uploadBtn.disabled = false;
                }
            } catch (e) {
                uploadStatus.textContent = 'Error: ' + e.message;
                uploadStatus.className = 'status error';
                uploadBtn.disabled = false;
            }
        });

        askForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = questionInput.value.trim();
            if (!q) return;
            askBtn.disabled = true;
            answerBox.textContent = 'Thinking...';
            answerBox.classList.remove('empty');

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: q }),
                });
                const data = await res.json();
                if (res.ok) {
                    answerBox.textContent = data.answer || 'No answer.';
                } else {
                    answerBox.textContent = 'Error: ' + (data.error || 'Unknown error');
                }
            } catch (e) {
                answerBox.textContent = 'Error: ' + e.message;
            }
            askBtn.disabled = false;
        });
    </script>
</body>
</html>
